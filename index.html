<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Park League</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Montserrat',sans-serif;
}

body{
    min-height:100vh;
    overflow:hidden;
    position:relative;
    color:white;
}

/* Background */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:
        linear-gradient(rgba(0,0,0,0.65),rgba(0,0,0,0.75)),
        url("https://images.unsplash.com/photo-1570498839593-e565b39455fc?q=80&w=1974&auto=format&fit=crop");
    background-size:cover;
    background-position:center;
    filter:blur(3px);
    transform:scale(1.1);
    z-index:-3;
}

/* Green Glow */
body::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:radial-gradient(circle at center,
    rgba(0,255,120,0.08), transparent 70%);
    z-index:-2;
}

/* Particles */
.particle{
    position:absolute;
    color:rgba(255,255,255,0.12);
    animation:float 10s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh) rotate(0deg);
    }
    to{
        transform:translateY(-100px) rotate(360deg);
    }
}

/* Header */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:30px 60px;
    animation:slideDown 1.5s;
}

.logo{
    font-size:45px;
}

.brand{
    font-family:'Bebas Neue',sans-serif;
    font-size:45px;
    letter-spacing:4px;
}

@keyframes slideDown{
    from{
        opacity:0;
        transform:translateY(-50px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Hero */
.hero{
    height:80vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    animation:fade 2s;
}

.hero h1{
    font-family:'Bebas Neue',sans-serif;
    font-size:120px;
    letter-spacing:10px;
    text-shadow:
        0 0 15px #00ff88,
        0 0 40px #00ff88;
}

.hero p{
    margin-top:10px;
    font-size:20px;
    color:#ddd;
    max-width:700px;
}

/* Button */
.join-btn{
    margin-top:45px;
    padding:18px 55px;
    font-size:24px;
    border:none;
    border-radius:60px;
    color:white;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.2);
    cursor:pointer;
    transition:0.4s;
    box-shadow:0 0 20px rgba(0,255,136,0.25);
    animation:floatBtn 3s ease-in-out infinite;
}

.join-btn:hover{
    transform:scale(1.1);
    background:#00ff88;
    color:black;
    box-shadow:0 0 35px #00ff88;
}

.join-btn:active{
    transform:scale(0.95);
}

@keyframes floatBtn{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-10px);
    }
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(50px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Mobile */
@media(max-width:768px){

    header{
        padding:20px;
    }

    .brand{
        font-size:30px;
    }

    .logo{
        font-size:30px;
    }

    .hero h1{
        font-size:65px;
    }

    .hero p{
        font-size:16px;
        padding:0 20px;
    }

    .join-btn{
        font-size:20px;
        padding:15px 40px;
    }
}
</style>
</head>

<body>

<header>
    <div class="logo">
        <i class="fa-solid fa-trophy"></i>
    </div>

    <div class="brand">
        Park League
    </div>
</header>

<section class="hero">
    <h1>PARK LEAGUE</h1>

    <p>
        Track your team's journey. Every goal, every match, every legend.
    </p>

    <button class="join-btn" onclick="window.location.href='home.html'">
    JOIN US
    </button>
</section>

<script>
// Football particles
for(let i=0;i<25;i++){
    let ball=document.createElement("div");
    ball.classList.add("particle");
    ball.innerHTML="⚽";

    ball.style.left=Math.random()*100+"vw";
    ball.style.fontSize=(Math.random()*20+15)+"px";
    ball.style.animationDuration=(Math.random()*10+8)+"s";
    ball.style.animationDelay=Math.random()*5+"s";

    document.body.appendChild(ball);
}
</script>

</body>
</html>
